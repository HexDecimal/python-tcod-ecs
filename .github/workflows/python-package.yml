# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Package

on:
  push:
    branches:
      - "*"
    tags:
      - "*.*.*"
  pull_request:
    types: [opened, reopened]

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pre-commit/action@v3.0.1

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6.2.0
      - name: Install package
        run: pip install -e ".[test]"
      - name: Mypy
        run: mypy --show-column-numbers

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15-dev"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6.2.0
        name: Setup Python ${{ matrix.python-version }}
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e ".[test]"
      - name: Run tests
        run: pytest --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install build
        run: pip install build
      - name: Build package
        run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  deploy:
    needs: [build-dist]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tcod-ecs/${{ github.ref_name }}/
    permissions:
      id-token: write # Attestation
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    if: github.ref_type == 'tag'
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Publish GitHub Releases
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Generate body
        run: scripts/get_release_description.py | tee release_body.md
      - name: Create Release
        id: create_release
        # https://cli.github.com/manual/gh_release_create
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --notes-file release_body.md
        env:
          GH_TOKEN: ${{ github.token }}
